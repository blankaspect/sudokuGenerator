#-----------------------------------------------------------------------
#
#  SymbolsPane : default colours for 'light' colour scheme
#
#  A colour value may have 1, 2, 3 or 4 components:
#    1 : <grey>
#    2 : <grey>, <opacity>
#    3 : <red>, <green>, <blue>
#    4 : <red>, <green>, <blue>, <opacity>
#  where
#    <grey>, <red>, <green>, <blue> are integers in the interval [0, 255]
#    <opacity> is a floating-point number in the interval [0, 1]
#
#-----------------------------------------------------------------------

symbolsField.background.valid = 208, 248, 208
symbolsField.background.invalid = 255, 208, 208

symbolsField.highlight.focused = 32, 72, 160
symbolsField.highlight.text.focused = 255

symbolsField.contextMenu.background = 255

symbolCountLabel.background = 252, 248, 232
symbolCountLabel.border = 224, 208, 176

